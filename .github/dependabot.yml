version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /.github/actions/setup-toolchain
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directories:
      - "/apps/api"
      - "/apps/proxy"
      - "/apps/runner"
      - "/apps/snapshot-manager"
      - "/apps/ssh-gateway"
      - "/apps/otel-collector"
      - "/apps/docs"
      - "/images/sandbox"
      - "/images/sandbox-slim"
      - "/images/sandbox-gpu"
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-base-images:
        patterns:
          - "*"
        exclude-patterns:
          - "docker"
      docker-engine:
        patterns:
          - "docker"
    ignore:
      # docker: dind major bumps need Sysbox compatibility review first
      - dependency-name: "docker"
        update-types:
          - "version-update:semver-major"
      # node: pin to LTS lines; majors land manually after they reach Active LTS
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
      # python: sandbox-slim runs user code. Auto-bump patch only; gate major AND
      # minor manually after lifecycle validation. Ignoring minor also stops
      # Dependabot proposing PEP 440 pre-release tags (e.g. 3.15.0bN), which it
      # does not recognize as pre-releases.
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    commit-message:
      prefix: "chore(deps)"

  # npm: scope to production manifests only.
  # NOTE: This config controls Dependabot PR creation, NOT GitHub Advisory
  # Database alert recurrence. Alerts in guides/ and runtime-tests/ paths
  # are dismissed in GitHub directly, with the rationale recorded on each
  # dismissal in the Dependabot alerts UI.
  - package-ecosystem: npm
    directories:
      - "/"
      - "/libs/sdk-typescript"
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-prod:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: pip
    directories:
      - "/libs/sdk-python"
      - "/libs/api-client-python"
      - "/libs/api-client-python-async"
      - "/libs/toolbox-api-client-python"
      - "/libs/toolbox-api-client-python-async"
    schedule:
      interval: weekly
      day: monday
    groups:
      pip-prod:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  # gomod: Go workspace modules (go.work). Without this they get
  # security-only updates and never version updates, so they drift.
  - package-ecosystem: gomod
    directories:
      - "/apps/cli"
      - "/apps/daemon"
      - "/apps/daytona-e2e"
      - "/apps/otel-collector/exporter"
      - "/apps/proxy"
      - "/apps/runner"
      - "/apps/snapshot-manager"
      - "/apps/ssh-gateway"
      - "/libs/api-client-go"
      - "/libs/common-go"
      - "/libs/computer-use"
      - "/libs/sdk-go"
      - "/libs/toolbox-api-client-go"
    schedule:
      interval: weekly
      day: monday
    groups:
      gomod-prod:
        patterns:
          - "*"
    ignore:
      # Go module majors are import-path changes (/v2, /v3) and always
      # breaking; land them manually after review.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "chore(deps)"
