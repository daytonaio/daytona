name: Docker Images Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'package.json'
      - 'yarn.lock'
      - 'nx.json'
      - 'tsconfig.base.json'
      - 'go.work'
      - '.github/workflows/docker_images_publish.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: daytona-lite-api
            dockerfile: apps/api/Dockerfile
          - service: proxy
            image: daytona-lite-proxy
            dockerfile: apps/proxy/Dockerfile
          - service: runner
            image: daytona-lite-runner
            dockerfile: apps/runner/Dockerfile
          - service: snapshot-manager
            image: daytona-lite-snapshot-manager
            dockerfile: apps/snapshot-manager/Dockerfile
          - service: ssh-gateway
            image: daytona-lite-ssh-gateway
            dockerfile: apps/ssh-gateway/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
