# E2E Sandbox Lifecycle Tests — PR (Built from Source)
#
# Runs automatically when nx affected detects changes to E2E-relevant projects
# (apps, SDKs, API clients). Builds from source, starts infrastructure + services,
# and runs daytona-e2e suite plus SDK E2E tests.

name: '[E2E] PR Sandbox Tests'

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-pr-tests:
    name: E2E sandbox lifecycle (from source)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-${{ runner.arch }}-

      - run: yarn install --immutable

      - name: Check if E2E-relevant projects are affected
        id: affected
        run: |
          if ! AFFECTED=$(npx nx show projects --affected --base=origin/${{ github.event.pull_request.base.ref }} --head=HEAD); then
            echo "Failed to determine affected projects"
            exit 1
          fi
          echo "Affected projects: $AFFECTED"
          if echo "$AFFECTED" | grep -qE 'daytona-e2e|^api$|^runner$|^proxy$|^daemon$|^dashboard$|sdk-typescript|sdk-python|sdk-go|sdk-ruby|sdk-java|api-client|toolbox-api-client'; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
            echo "No E2E-relevant projects affected — skipping"
          fi
          if echo "$AFFECTED" | grep -qE '(^|,| )sdk-typescript($|,| )|(^|,| )api-client($|,| )|(^|,| )toolbox-api-client($|,| )'; then
            echo "sdk_ts_affected=true" >> $GITHUB_OUTPUT
          else
            echo "sdk_ts_affected=false" >> $GITHUB_OUTPUT
          fi

      - uses: ./.github/actions/setup-toolchain
        if: steps.affected.outputs.affected == 'true'

      - name: Configure Docker daemon for insecure local registry
        if: steps.affected.outputs.affected == 'true'
        run: |
          echo '{"insecure-registries": ["localhost:5000"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sudo systemctl is-active docker

      - name: Start infrastructure (postgres, redis, dex, registry)
        if: steps.affected.outputs.affected == 'true'
        run: |
          docker compose -f apps/daytona-e2e/docker-compose.e2e.yaml up -d --wait
          docker compose -f apps/daytona-e2e/docker-compose.e2e.yaml ps

      - name: Build services needed for E2E
        if: steps.affected.outputs.affected == 'true'
        run: |
          source "$(poetry env info --path)/bin/activate"
          VERSION=v0.0.0-dev yarn nx run-many --target=build --projects=api,runner,proxy,dashboard

      - name: Copy E2E env to API
        if: steps.affected.outputs.affected == 'true'
        run: cp apps/daytona-e2e/.env.e2e apps/api/.env

      - name: Run DB migrations
        if: steps.affected.outputs.affected == 'true'
        run: yarn migration:run:init && yarn migration:run:pre-deploy

      - name: Install gow (Go file watcher for serve targets)
        if: steps.affected.outputs.affected == 'true'
        run: go install github.com/mitranim/gow@v0.0.0-20260225145757-ff0f6779ab4c

      - name: Start API and runner
        if: steps.affected.outputs.affected == 'true'
        run: |
          set -a
          source apps/daytona-e2e/.env.e2e
          set +a

          npx nx serve api --configuration=development > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

          npx nx serve runner --configuration=development > /tmp/runner.log 2>&1 &
          echo $! > /tmp/runner.pid

      - name: Wait for API to be ready
        if: steps.affected.outputs.affected == 'true'
        run: |
          echo "Waiting for API at http://localhost:3001/api/health ..."
          echo "Note: nx serve compiles Go services via gow before starting (~90s)"
          for i in $(seq 1 150); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "API is ready (attempt $i, elapsed ~$((i*2))s)"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start within 300s"
          echo "=== API logs (last 100 lines) ==="
          tail -100 /tmp/api.log 2>/dev/null || echo "No API logs found"
          echo "=== Runner logs (last 50 lines) ==="
          tail -50 /tmp/runner.log 2>/dev/null || echo "No runner logs found"
          exit 1

      - name: Start proxy and dashboard
        if: steps.affected.outputs.affected == 'true'
        run: |
          set -a
          source apps/daytona-e2e/.env.e2e
          set +a

          npx nx serve proxy --configuration=development > /tmp/proxy.log 2>&1 &
          echo $! > /tmp/proxy.pid

          npx nx serve dashboard --configuration=development > /tmp/dashboard.log 2>&1 &
          echo $! > /tmp/dashboard.pid

      - name: Wait for default snapshot to be available
        if: steps.affected.outputs.affected == 'true'
        run: |
          echo "Waiting for default snapshot (daytonaio/sandbox:0.6.0-slim) to become active..."
          echo "Runner must boot, API creates snapshot (pending), cron job transitions it to active"
          for i in $(seq 1 150); do
            BODY=$(curl -s \
              -H "Authorization: Bearer e2e_admin_api_key" \
              "http://localhost:3001/api/snapshots/daytonaio%2Fsandbox%3A0.6.0-slim" 2>/dev/null || echo "")
            STATE=$(echo "$BODY" | jq -r '.state // empty' 2>/dev/null || echo "")
            if [ "$STATE" = "active" ]; then
              echo "Default snapshot is active (attempt $i, elapsed ~$((i*2))s)"
              exit 0
            fi
            if [ "$((i % 10))" = "0" ]; then
              echo "Attempt $i: snapshot state='${STATE:-not found}' (elapsed ~$((i*2))s)"
            fi
            sleep 2
          done
          echo "Default snapshot not active after 300s"
          echo "Last snapshot response:"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          echo ""
          echo "=== Runner logs (full) ==="
          cat /tmp/runner.log 2>/dev/null || echo "No runner logs found"
          echo ""
          echo "=== API logs (last 50 lines) ==="
          tail -50 /tmp/api.log 2>/dev/null || echo "No API logs found"
          exit 1

      - name: Run daytona-e2e tests
        if: steps.affected.outputs.affected == 'true'
        env:
          DAYTONA_API_URL: http://localhost:3001/api
          DAYTONA_API_KEY: e2e_admin_api_key
        run: yarn nx e2e daytona-e2e

      - name: Install Python test dependencies
        if: steps.affected.outputs.affected == 'true'
        run: |
          source "$(poetry env info --path)/bin/activate"
          pip install pytest pytest-asyncio pytest-timeout

      - name: Publish Java API clients to Maven local
        if: steps.affected.outputs.affected == 'true'
        run: |
          (cd libs/api-client-java && ./gradlew publishToMavenLocal -x test)
          (cd libs/toolbox-api-client-java && ./gradlew publishToMavenLocal -x test)

      - name: Run SDK E2E tests
        if: steps.affected.outputs.affected == 'true'
        env:
          DAYTONA_API_URL: http://localhost:3001/api
          DAYTONA_API_KEY: e2e_admin_api_key
        run: yarn test:e2e

      - name: Install Bun
        if: steps.affected.outputs.sdk_ts_affected == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install Deno
        if: steps.affected.outputs.sdk_ts_affected == 'true'
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install Azure Functions Core Tools
        if: steps.affected.outputs.sdk_ts_affected == 'true'
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Install Playwright Chromium (for vite-browser test)
        if: steps.affected.outputs.sdk_ts_affected == 'true'
        run: npx --yes playwright@1.48 install --with-deps chromium

      - name: Run TypeScript SDK runtime compatibility tests
        if: steps.affected.outputs.sdk_ts_affected == 'true'
        env:
          DAYTONA_API_URL: http://localhost:3001/api
          DAYTONA_API_KEY: e2e_admin_api_key
        run: yarn nx run sdk-typescript:test:runtime

      - name: Cleanup stale E2E sandboxes
        if: always() && steps.affected.outputs.affected == 'true'
        env:
          DAYTONA_API_URL: http://localhost:3001/api
          DAYTONA_API_KEY: e2e_admin_api_key
        run: yarn nx e2e:cleanup daytona-e2e

      - name: Dump service logs
        if: always() && steps.affected.outputs.affected == 'true'
        run: |
          for svc in api runner proxy dashboard; do
            echo "=== ${svc} logs (last 200 lines) ==="
            tail -200 /tmp/${svc}.log 2>/dev/null || echo "No ${svc} logs found"
          done

      - name: Stop services
        if: always() && steps.affected.outputs.affected == 'true'
        run: |
          for svc in api runner proxy dashboard; do
            if [ -f /tmp/${svc}.pid ]; then
              kill $(cat /tmp/${svc}.pid) 2>/dev/null || true
            fi
          done

      - name: Tear down infrastructure
        if: always() && steps.affected.outputs.affected == 'true'
        run: docker compose -f apps/daytona-e2e/docker-compose.e2e.yaml down -v
