name: '[PR] Validate code'

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  # New commit on branch cancels running workflows of the same branch
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VIRTUALENVS_IN_PROJECT: true
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  go-work:
    name: Go work
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: '**/go.sum'
      - name: go work
        run: |
          GONOSUMDB=github.com/daytonaio/daytona go work sync
          git diff --exit-code -- 'go.work*' '*/go.mod' '*/go.sum' || (echo "Go workspace files are not up to date! Please run 'go work sync' and commit the changes." && exit 1)

  cli-docs:
    name: CLI docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - run: corepack enable
      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-${{ runner.arch }}-
      - run: yarn install --immutable
      - name: Check CLI reference docs are up to date
        run: |
          cd apps/docs
          node tools/update-cli-reference.js --local
          git diff --exit-code -- src/content/docs/en/tools/cli.mdx || (echo "CLI reference docs on the docs site are out of sync! Please run 'cd apps/docs && node tools/update-cli-reference.js --local' and commit the changes." && exit 1)

  golangci:
    name: Go lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        working-directory: [apps/daemon, apps/runner, apps/cli, apps/proxy, libs/sdk-go, apps/otel-collector/exporter]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: '**/go.sum'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.6.2
          working-directory: ${{ matrix.working-directory }}
          args: --timeout=5m ./...
      - name: format
        run: |
          cd ${{ matrix.working-directory }}
          go fmt ./...
          git diff --exit-code '**/*.go' || (echo "Code is not formatted! Please run 'go fmt ./...' and commit" && exit 1)

  lint-computer-use:
    name: Go lint (Computer Use)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: '**/go.sum'
      - name: format
        run: |
          sudo apt-get update && sudo apt-get install -y gcc libx11-dev libxtst-dev
          cd libs/computer-use
          go fmt ./...
          git diff --exit-code '**/*.go' || (echo "Code is not formatted! Please run 'go fmt ./...' and commit" && exit 1)
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.6.2
          working-directory: libs/computer-use
          args: --timeout=5m ./...

  lint-python:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          corepack enable
          python -m pip install --upgrade pip
          pip install "poetry==2.1.3"
          poetry install
      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-${{ runner.arch }}-
      - run: yarn install --immutable
      - name: Lint Python Code
        run: |
          source "$(poetry env info --path)/bin/activate"
          yarn lint:py

  format-lint-api-clients:
    name: Format, lint and generate API clients
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-toolchain
        with:
          run-go-work-sync: 'false'
      - name: generate-api-clients
        run: |
          source "$(poetry env info --path)/bin/activate"
          go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@v1.1.0
          echo -e 'DEFAULT_PACKAGE_VERSION=0.0.0-dev\nDEFAULT_GEM_VERSION=0.0.0.pre.dev\n\nPYPI_PKG_VERSION=\nNPM_PKG_VERSION=\nNPM_TAG=\nPYPI_TOKEN=\nNPM_TOKEN=' > .env
          mkdir -p dist/apps/api
          yarn generate:api-client
          yarn lint:fix
          yarn format
          poetry lock
          yarn docs
          GONOSUMDB=github.com/daytonaio/daytona go work sync
          git diff --exit-code || (echo "Code not formatted or linting errors! Hint: 'yarn generate:api-client', 'yarn lint:fix', 'yarn docs' and commit" && exit 1)

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-toolchain
      - name: Run tests
        run: yarn test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-toolchain
      - name: Build all
        run: |
          source "$(poetry env info --path)/bin/activate"
          VERSION=v0.0.0-dev yarn build --nxBail=true

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check AGPL License Headers
        uses: apache/skywalking-eyes/header@e0cc16d0e47f446fbc456d0e670dc50dec09719e # main
        with:
          token: ${{ github.token }}
          config: .licenserc.yaml
          mode: 'check'

      - name: Check Apache License Headers
        uses: apache/skywalking-eyes/header@e0cc16d0e47f446fbc456d0e670dc50dec09719e # main
        with:
          token: ${{ github.token }}
          config: .licenserc-clients.yaml
          mode: 'check'

  yarnrc-lint:
    name: Yarnrc integrity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Ensure PyYAML available
        run: sudo apt-get install -y -q python3-yaml
      - name: Validate .yarnrc.yml
        run: |
          python3 <<'PY'
          import posixpath
          import re
          import sys
          from pathlib import Path

          import yaml

          yarnrc = Path(".yarnrc.yml")
          if not yarnrc.exists():
              print("::error::.yarnrc.yml is required and must not be removed -- it carries supply chain hardening (npmMinimalAgeGate, etc.)")
              sys.exit(1)

          # Strict allowlist regex for trusted registry URLs.
          # Using a regex instead of urlparse() avoids parser-differential bypasses
          # (Python RFC 3986 vs Node.js WHATWG URL disagree on backslashes in special-scheme URLs,
          # e.g. 'https://evil.com\@registry.npmjs.org/' -- urlparse sees registry.npmjs.org as host,
          # Yarn's WHATWG parser sees evil.com as host).
          TRUSTED_REGISTRY = re.compile(
              r"^https://(registry\.npmjs\.org|registry\.yarnpkg\.com)(/.*)?$"
          )

          # Required hardening keys with minimum acceptable values.
          # These must not be removed or weakened -- a malicious PR that strips them
          # would pass a file-existence check but silently disable supply chain protection.
          REQUIRED_KEYS = {
              "npmMinimalAgeGate": 10080,  # 7 days in minutes
          }

          errors = []

          try:
              config = yaml.safe_load(yarnrc.read_text(encoding="utf-8"))
          except yaml.YAMLError as e:
              print(f"::error::Failed to parse .yarnrc.yml: {e}")
              sys.exit(1)

          if config is None:
              config = {}
          elif not isinstance(config, dict):
              print(f"::error::.yarnrc.yml must contain a top-level mapping, got: {type(config).__name__}")
              sys.exit(1)

          def is_truthy(value):
              """Match Python True, integer 1, or any common YAML truthy string."""
              if value is True:
                  return True
              if isinstance(value, bool):
                  return False
              if isinstance(value, int) and value == 1:
                  return True
              if isinstance(value, str) and value.strip().lower() in {"true", "yes", "on", "1"}:
                  return True
              return False

          def check_registry(key, value, location):
              if not isinstance(value, str):
                  errors.append(f"{location}.{key} is not a string: {value!r}")
                  return
              # Reject any backslash outright -- Python and Node.js WHATWG URL parsers differ
              # on backslash handling in special-scheme URLs, which can be exploited.
              if "\\" in value or "%5c" in value.lower():
                  errors.append(f"{location}.{key} contains backslash (parser differential bypass): {value!r}")
                  return
              if not TRUSTED_REGISTRY.match(value):
                  errors.append(
                      f"{location}.{key} must be a trusted registry URL "
                      f"(https://registry.npmjs.org/ or https://registry.yarnpkg.com/), got: {value}"
                  )

          # Required hardening keys must be present and not weakened
          for key, min_value in REQUIRED_KEYS.items():
              if key not in config:
                  errors.append(f"{key} is missing -- this supply chain hardening setting must not be removed")
              elif not isinstance(config[key], int) or isinstance(config[key], bool) or config[key] < min_value:
                  errors.append(f"{key} must be an integer >= {min_value}, got: {config[key]!r}")

          # Top-level registry overrides
          for key in ("npmRegistryServer", "npmPublishRegistry"):
              if key in config:
                  check_registry(key, config[key], "root")

          # Per-scope registry overrides
          npm_scopes = config.get("npmScopes")
          if npm_scopes is None:
              npm_scopes = {}
          elif not isinstance(npm_scopes, dict):
              errors.append(f"root.npmScopes must be a mapping, got: {type(npm_scopes).__name__}")
              npm_scopes = {}

          for scope, scope_config in npm_scopes.items():
              if not isinstance(scope_config, dict):
                  errors.append(f"npmScopes.{scope} must be a mapping, got: {type(scope_config).__name__}")
                  continue
              for key in ("npmRegistryServer", "npmPublishRegistry"):
                  if key in scope_config:
                      check_registry(key, scope_config[key], f"npmScopes.{scope}")
              # Per-scope enableScripts (defense in depth for future Yarn versions)
              if is_truthy(scope_config.get("enableScripts")):
                  errors.append(f"npmScopes.{scope}.enableScripts is enabled -- postinstall scripts execute arbitrary code")

          # enableScripts (catches Python True, int 1, and YAML truthy strings)
          if is_truthy(config.get("enableScripts")):
              errors.append("enableScripts is enabled -- postinstall scripts can execute arbitrary code")

          # unsafeHttpWhitelist undermines the HTTPS enforcement -- only allow absent/null or exactly []
          if "unsafeHttpWhitelist" in config:
              unsafe_whitelist = config["unsafeHttpWhitelist"]
              if unsafe_whitelist is not None and unsafe_whitelist != []:
                  errors.append(f"unsafeHttpWhitelist must be absent or an empty list, got: {unsafe_whitelist!r} -- bypasses HTTPS enforcement")

          # yarnPath must be absent (Corepack) or a normalized path under .yarn/releases/
          if "yarnPath" in config:
              yarn_path = config["yarnPath"]
              if not isinstance(yarn_path, str):
                  errors.append(f"yarnPath must be a string, got: {yarn_path!r}")
              else:
                  # Normalize to resolve any .. segments, then confirm it's under .yarn/releases/
                  normalized = posixpath.normpath(yarn_path)
                  if ".." in yarn_path.split("/") or not normalized.startswith(".yarn/releases/"):
                      errors.append(f"yarnPath must resolve to a path under '.yarn/releases/' (no traversal, no absolute paths), got: {yarn_path!r}")

          # plugins execute arbitrary code on every yarn invocation -- only allow absent/null or exactly []
          if "plugins" in config:
              plugins = config["plugins"]
              if plugins is not None and plugins != []:
                  errors.append(f"plugins must be absent or an empty list, got: {plugins!r} -- plugins execute arbitrary code. Add explicit allowlist to this check if needed.")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)

          print("OK -- .yarnrc.yml passes integrity check")
          PY
