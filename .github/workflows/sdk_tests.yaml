name: '[PR] SDK Tests'

on:
  pull_request:
    branches:
      - main
    paths:
      - 'libs/sdk-typescript/**'
      - 'libs/sdk-python/**'
      - 'libs/sdk-go/**'
      - 'libs/sdk-ruby/**'
      - 'libs/api-client/**'
      - 'libs/api-client-go/**'
      - 'libs/api-client-python/**'
      - 'libs/api-client-python-async/**'
      - 'libs/api-client-ruby/**'
      - 'libs/toolbox-api-client/**'
      - 'libs/toolbox-api-client-go/**'
      - 'libs/toolbox-api-client-python/**'
      - 'libs/toolbox-api-client-python-async/**'
      - 'libs/toolbox-api-client-ruby/**'
      - '.github/workflows/sdk_tests.yaml'
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E tests (requires API credentials)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VIRTUALENVS_IN_PROJECT: true

jobs:
  detect-changes:
    name: Detect SDK changes
    runs-on: ubuntu-latest
    outputs:
      sdk-typescript: ${{ steps.changes.outputs.sdk-typescript }}
      sdk-python: ${{ steps.changes.outputs.sdk-python }}
      sdk-go: ${{ steps.changes.outputs.sdk-go }}
      sdk-ruby: ${{ steps.changes.outputs.sdk-ruby }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            sdk-typescript:
              - 'libs/sdk-typescript/**'
              - 'libs/api-client/**'
              - 'libs/toolbox-api-client/**'
            sdk-python:
              - 'libs/sdk-python/**'
              - 'libs/api-client-python/**'
              - 'libs/api-client-python-async/**'
              - 'libs/toolbox-api-client-python/**'
              - 'libs/toolbox-api-client-python-async/**'
            sdk-go:
              - 'libs/sdk-go/**'
              - 'libs/api-client-go/**'
              - 'libs/toolbox-api-client-go/**'
            sdk-ruby:
              - 'libs/sdk-ruby/**'
              - 'libs/api-client-ruby/**'
              - 'libs/toolbox-api-client-ruby/**'

  # ─── Unit Tests (run on every PR with relevant changes) ───────────────

  test-typescript-sdk:
    name: TypeScript SDK Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk-typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-${{ runner.arch }}-
      - run: yarn install --immutable
      - name: Build dependencies
        run: |
          yarn nx build api-client
          yarn nx build toolbox-api-client
      - name: Run TypeScript SDK Unit Tests
        run: npx jest --config libs/sdk-typescript/jest.config.js --testPathIgnorePatterns='e2e' --verbose

  test-python-sdk:
    name: Python SDK Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk-python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry==2.1.3"
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: poetry-venv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-venv-${{ runner.os }}-${{ runner.arch }}-
      - name: Install dependencies
        run: |
          poetry lock
          poetry install
      - name: Install test dependencies
        run: |
          source "$(poetry env info --path)/bin/activate"
          pip install pytest pytest-asyncio
      - name: Run Python SDK Unit Tests
        run: |
          source "$(poetry env info --path)/bin/activate"
          python -m pytest libs/sdk-python/tests/ -v --tb=short --ignore=libs/sdk-python/tests/test_e2e.py

  test-go-sdk:
    name: Go SDK Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk-go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: '**/go.sum'
      - name: Run Go SDK Unit Tests
        working-directory: libs/sdk-go
        run: go test -v -race -count=1 -run '^Test[^E]|^TestE[^2]|^TestE2[^E]' ./...

  test-ruby-sdk:
    name: Ruby SDK Unit Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk-ruby == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.5'
          bundler-cache: false
      - name: Install dependencies
        working-directory: libs/sdk-ruby
        run: bundle install
      - name: Run Ruby SDK Unit Tests
        working-directory: libs/sdk-ruby
        run: bundle exec rspec --format documentation --tag '~e2e'

  # ─── E2E Tests (manual dispatch only, requires API credentials) ──────

  e2e-typescript-sdk:
    name: TypeScript SDK E2E Tests
    needs: detect-changes
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e == 'true') ||
      (needs.detect-changes.outputs.sdk-typescript == 'true' && github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    environment: sdk-e2e-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-${{ runner.arch }}-
      - run: yarn install --immutable
      - name: Build dependencies
        run: |
          yarn nx build api-client
          yarn nx build toolbox-api-client
      - name: Run TypeScript SDK E2E Tests
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL }}
        run: npx jest --config libs/sdk-typescript/jest.config.js --testPathPattern='e2e' --testTimeout=120000 --verbose

  e2e-python-sdk:
    name: Python SDK E2E Tests
    needs: detect-changes
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e == 'true') ||
      (needs.detect-changes.outputs.sdk-python == 'true' && github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    environment: sdk-e2e-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install "poetry==2.1.3"
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: poetry-venv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-venv-${{ runner.os }}-${{ runner.arch }}-
      - name: Install dependencies
        run: |
          poetry lock
          poetry install
      - name: Install test dependencies
        run: |
          source "$(poetry env info --path)/bin/activate"
          pip install pytest pytest-asyncio pytest-timeout
      - name: Run Python SDK E2E Tests
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL }}
        run: |
          source "$(poetry env info --path)/bin/activate"
          python -m pytest libs/sdk-python/tests/test_e2e.py -v -s --timeout=180

  e2e-go-sdk:
    name: Go SDK E2E Tests
    needs: detect-changes
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e == 'true') ||
      (needs.detect-changes.outputs.sdk-go == 'true' && github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    environment: sdk-e2e-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: '**/go.sum'
      - name: Run Go SDK E2E Tests
        working-directory: libs/sdk-go
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL }}
        run: go test -v -run TestE2E -timeout 180s -count=1 ./pkg/daytona/

  e2e-ruby-sdk:
    name: Ruby SDK E2E Tests
    needs: detect-changes
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e == 'true') ||
      (needs.detect-changes.outputs.sdk-ruby == 'true' && github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    environment: sdk-e2e-tests
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.5'
          bundler-cache: false
      - name: Install dependencies
        working-directory: libs/sdk-ruby
        run: bundle install
      - name: Run Ruby SDK E2E Tests
        working-directory: libs/sdk-ruby
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL }}
        run: bundle exec rspec spec/e2e_spec.rb --format documentation
