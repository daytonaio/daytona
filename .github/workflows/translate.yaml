name: GT Translate
on:
  push:
    branches: [main]

jobs:
  translate:
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.author.name != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'gt-translate/') }}
    env:
      GT_API_KEY: ${{ secrets.GT_API_KEY }}
      GT_PROJECT_ID: ${{ secrets.GT_PROJECT_ID }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve translate config
        id: config
        run: |
          if [ -f apps/docs/gt.config.json ]; then
            echo "path=apps/docs/gt.config.json" >> "$GITHUB_OUTPUT"
          elif [ -f docs/gt.config.json ]; then
            echo "path=docs/gt.config.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - uses: generaltranslation/translate@v0
        if: ${{ steps.config.outputs.path != '' && env.GT_API_KEY != '' && env.GT_PROJECT_ID != '' }}
        with:
          gt_api_key: ${{ env.GT_API_KEY }}
          gt_project_id: ${{ env.GT_PROJECT_ID }}
          config: ${{ steps.config.outputs.path }}
          inline: true
          timeout: 3600
          pr_branch: 'gt-translate/${{ github.ref_name }}'
