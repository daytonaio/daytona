name: GT Translate
on:
  push:
    branches: [main]

permissions: {}

jobs:
  translate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.repository == 'daytonaio/daytona' && github.event.head_commit.author.name != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'gt-translate/') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: generaltranslation/translate@7e7badcae4494bfa58c95415a933251992aedb7c # v0
        with:
          gt_api_key: ${{ secrets.GT_API_KEY }}
          gt_project_id: ${{ secrets.GT_PROJECT_ID }}
          config: 'apps/docs/gt.config.json'
          inline: true
          timeout: 3600
          pr_branch: 'gt-translate/${{ github.ref_name }}'
