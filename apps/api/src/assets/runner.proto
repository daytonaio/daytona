syntax = "proto3";

package runner;

option go_package = "github.com/daytonaio/runner/proto";

service Runner {
  // Health endpoints
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {}

  // Sandbox endpoints
  rpc CreateSandbox(CreateSandboxRequest) returns (CreateSandboxResponse) {}
  rpc DestroySandbox(DestroySandboxRequest) returns (DestroySandboxResponse) {}
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse) {}
  rpc StartSandbox(StartSandboxRequest) returns (StartSandboxResponse) {}
  rpc StopSandbox(StopSandboxRequest) returns (StopSandboxResponse) {}
  rpc GetSandboxInfo(GetSandboxInfoRequest) returns (GetSandboxInfoResponse) {}
  rpc RemoveDestroyedSandbox(RemoveDestroyedSandboxRequest) returns (RemoveDestroyedSandboxResponse) {}

  // Image endpoints
  rpc PullImage(PullImageRequest) returns (PullImageResponse) {}
  rpc BuildImage(BuildImageRequest) returns (BuildImageResponse) {}
  rpc ImageExists(ImageExistsRequest) returns (ImageExistsResponse) {}
  rpc RemoveImage(RemoveImageRequest) returns (RemoveImageResponse) {}
  rpc GetBuildLogs(GetBuildLogsRequest) returns (stream LogLine) {}

  // Unified proxy method for all HTTP requests
  rpc ProxyRequest(ProxyRequestMsg) returns (ProxyResponseMsg);
  
  // Unified streaming proxy for WebSocket-like streaming
  rpc ProxyStream(ProxyStreamRequest) returns (stream ProxyStreamResponse);
}

// Health messages
message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string version = 2;
}

// Sandbox messages
message CreateSandboxRequest {
  string id = 1;
  optional string from_volume_id = 2;
  string user_id = 3;
  string image = 4;
  string os_user = 5;
  int64 cpu_quota = 6;
  int64 gpu_quota = 7;
  int64 memory_quota = 8;
  int64 storage_quota = 9;
  map<string, string> env = 10;
  optional Registry registry = 11;
  repeated string entrypoint = 12;
  repeated Volume volumes = 13;
}

message CreateSandboxResponse {
  string sandbox_id = 1;
}

message DestroySandboxRequest {
  string sandbox_id = 1;
}

message DestroySandboxResponse {
  string message = 1;
}

message CreateSnapshotRequest {
  string sandbox_id = 1;
  Registry registry = 2;
  string image = 3;
}

message CreateSnapshotResponse {
  string message = 1;
}

message StartSandboxRequest {
  string sandbox_id = 1;
}

message StartSandboxResponse {
  string message = 1;
}

message StopSandboxRequest {
  string sandbox_id = 1;
}

message StopSandboxResponse {
  string message = 1;
}

message GetSandboxInfoRequest {
  string sandbox_id = 1;
}

message GetSandboxInfoResponse {
  string state = 1;
  string snapshot_state = 2;
}

message RemoveDestroyedSandboxRequest {
  string sandbox_id = 1;
}

message RemoveDestroyedSandboxResponse {
  string message = 1;
}

// Image messages
message Registry {
  string url = 1;
  optional string project = 2;
  optional string username = 3;
  optional string password = 4;
}

message PullImageRequest {
  string image = 1;
  Registry registry = 2;
}

message PullImageResponse {
  string message = 1;
}

message BuildImageRequest {
  optional string image = 1;
  optional Registry registry = 2;
  string dockerfile = 3;
  string organization_id = 4;
  repeated string context = 5;
  optional bool push_to_internal_registry = 6;
}

message BuildImageResponse {
  string message = 1;
}

message ImageExistsRequest {
  string image = 1;
  bool include_latest = 2;
}

message ImageExistsResponse {
  bool exists = 1;
}

message RemoveImageRequest {
  string image = 1;
  bool force = 2;
}

message RemoveImageResponse {
  string message = 1;
}

message GetBuildLogsRequest {
  string image_ref = 1;
  bool follow = 2;
}

message LogLine {
  string content = 1;
}

// Generic proxy request that can handle any HTTP request
message ProxyRequestMsg {
  string sandbox_id = 1;
  string path = 2;                           // The path after /toolbox/
  string method = 3;                         // HTTP method (GET, POST, etc.)
  map<string, string> headers = 4;           // HTTP headers
  bytes body = 5;                           // Request body
  map<string, string> query_params = 6;     // Query parameters
}

// Generic proxy response that can handle any HTTP response
message ProxyResponseMsg {
  int32 status_code = 1;                    // HTTP status code
  map<string, string> headers = 2;          // Response headers
  bytes body = 3;                          // Response body
}

// Streaming proxy request
message ProxyStreamRequest {
  string sandbox_id = 1;
  string path = 2;                          // The path that requires streaming
  map<string, string> query_params = 3;    // Query parameters (like follow=true)
  map<string, string> headers = 4;          // HTTP headers
}

// Streaming proxy response
message ProxyStreamResponse {
  oneof response_type {
    StreamData data = 1;                    // Streaming data chunk
    StreamError error = 2;                  // Error during streaming
    StreamClose close = 3;                  // Stream closed
  }
}

message StreamData {
  bytes content = 1;                        // Raw content chunk
  int64 timestamp = 2;                      // Timestamp when received
}

message StreamError {
  string message = 1;                       // Error message
  int32 code = 2;                          // Error code
}

message StreamClose {
  int32 code = 1;                          // Close code
  string reason = 2;                       // Close reason
}

// Add Volume message for CreateSandboxRequest
message Volume {
  string volume_id = 1;
  string mount_path = 2;
}