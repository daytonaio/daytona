name: daytona list
synopsis: List sandboxes
usage: daytona list [flags]
options:
  - name: cursor
    shorthand: c
    usage: Cursor for pagination
  - name: format
    shorthand: f
    usage: Output format. Must be one of (yaml, json)
  - name: limit
    shorthand: l
    default_value: '100'
    usage: Maximum number of items per page
inherited_options:
  - name: help
    default_value: 'false'
    usage: help for daytona
see_also:
  - daytona - Daytona CLI
