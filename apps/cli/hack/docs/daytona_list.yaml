name: daytona list
synopsis: List sandboxes
usage: daytona list [flags]
options:
  - name: cursor
    shorthand: c
    usage: Cursor for pagination
  - name: format
    shorthand: f
    usage: Output format. Must be one of (yaml, json)
  - name: limit
    shorthand: l
    default_value: '100'
    usage: Maximum number of items per page
inherited_options:
  - name: help
    default_value: 'false'
    usage: help for daytona
  - name: no-input
    default_value: 'false'
    usage: |
      Never prompt for input; fail instead when input would be required
example: |4-
      daytona list
      daytona list --limit 50
      daytona list --format json
see_also:
  - daytona - Daytona CLI
