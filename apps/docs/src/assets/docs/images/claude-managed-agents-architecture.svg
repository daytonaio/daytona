<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 500" width="1040" height="500" role="img" aria-labelledby="archtitle archdesc">
  <title id="archtitle">Architecture: Claude Managed Agents on Daytona</title>
  <desc id="archdesc">Three-actor topology. One or more applications and an orchestrator talk to Anthropic. Anthropic dispatches the agent's tools directly into a Daytona sandbox; the orchestrator handles the work queue and sandbox lifecycle.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a1a1aa" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1040" height="500" rx="16" fill="#0a0a0a" />
  <rect x="0.5" y="0.5" width="1039" height="499" rx="16" fill="none" stroke="#27272a" stroke-width="1" />

  <!-- Title -->
  <text x="60" y="50" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="25.5" font-weight="600" letter-spacing="-0.02em">Architecture</text>
  <text x="60" y="76" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="17.5">Three parties: you, Anthropic, Daytona</text>

  <!-- App A (full content) -->
  <rect x="60" y="140" width="220" height="160" rx="10" fill="#14141a" stroke="#3f3f46" stroke-width="1.5" />
  <text x="170" y="172" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="19.5" font-weight="600" text-anchor="middle">App</text>
  <text x="170" y="192" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="14.5" font-style="italic" text-anchor="middle">e.g. PR reviewer</text>
  <text x="170" y="216" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">creates sessions</text>
  <text x="170" y="236" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">sends user messages</text>
  <text x="170" y="256" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">streams events</text>
  <text x="170" y="282" fill="#61616a" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13.5" text-anchor="middle">yours</text>

  <!-- App B (compact) -->
  <rect x="60" y="320" width="220" height="90" rx="10" fill="#14141a" stroke="#3f3f46" stroke-width="1.5" />
  <text x="170" y="350" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="19.5" font-weight="600" text-anchor="middle">App</text>
  <text x="170" y="370" fill="#71717a" font-family="Inter, system-ui, sans-serif" font-size="14.5" font-style="italic" text-anchor="middle">e.g. nightly job</text>
  <text x="170" y="394" fill="#61616a" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13.5" text-anchor="middle">yours</text>

  <!-- Anthropic -->
  <rect x="380" y="140" width="280" height="160" rx="10" fill="#14141a" stroke="#d97858" stroke-width="1.5" />
  <text x="520" y="172" fill="#d97858" font-family="Inter, system-ui, sans-serif" font-size="19.5" font-weight="600" text-anchor="middle">Anthropic</text>
  <text x="520" y="200" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">agent loop · model · prompt caching</text>
  <text x="520" y="222" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">event stream · session history</text>
  <text x="520" y="244" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">work queue · MCP tools</text>
  <text x="520" y="282" fill="#61616a" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13.5" text-anchor="middle">hosted by Anthropic</text>

  <!-- Orchestrator -->
  <rect x="760" y="140" width="220" height="160" rx="10" fill="#14141a" stroke="#3f3f46" stroke-width="1.5" />
  <text x="870" y="172" fill="#fafafa" font-family="Inter, system-ui, sans-serif" font-size="19.5" font-weight="600" text-anchor="middle">Orchestrator</text>
  <text x="870" y="200" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">polls work queue</text>
  <text x="870" y="222" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">starts/stops sandboxes</text>
  <text x="870" y="244" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">sandbox lifecycle</text>
  <text x="870" y="282" fill="#61616a" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13.5" text-anchor="middle">yours</text>

  <!-- Daytona sandbox -->
  <rect x="760" y="340" width="220" height="120" rx="10" fill="#14141a" stroke="#2ecc71" stroke-width="1.5" />
  <text x="870" y="372" fill="#2ecc71" font-family="Inter, system-ui, sans-serif" font-size="19.5" font-weight="600" text-anchor="middle">Daytona sandbox</text>
  <text x="870" y="400" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">filesystem · bash shell</text>
  <text x="870" y="422" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="15.5" text-anchor="middle">one container per session</text>
  <text x="870" y="444" fill="#61616a" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13.5" text-anchor="middle">hosted on Daytona</text>

  <!-- Arrows -->
  <!-- App A ↔ Anthropic (labels live on this arrow) -->
  <line x1="280" y1="220" x2="380" y2="220" stroke="#a1a1aa" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="330" y="210" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="13.5" text-anchor="middle">events</text>
  <text x="330" y="240" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="13.5" text-anchor="middle">user messages</text>

  <!-- App B ↔ Anthropic (L-shape, no labels; flow is the same as App A) -->
  <path d="M 280 365 L 340 365 L 340 290 L 380 290" fill="none" stroke="#a1a1aa" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />

  <!-- Anthropic ↔ Orchestrator -->
  <line x1="660" y1="200" x2="760" y2="200" stroke="#a1a1aa" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="710" y="190" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="13.5" text-anchor="middle">work queue</text>

  <!-- Anthropic ↔ Daytona sandbox (tools dispatched directly) -->
  <path d="M 660 280 L 720 280 L 720 380 L 760 380" fill="none" stroke="#a1a1aa" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="728" y="272" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="13.5" text-anchor="end">tool calls ↓</text>
  <text x="713" y="377" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="13.5" text-anchor="end">tool results ↑</text>

  <!-- Orchestrator → Daytona sandbox (lifecycle only) -->
  <line x1="870" y1="300" x2="870" y2="340" stroke="#a1a1aa" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="878" y="324" fill="#a1a1aa" font-family="Inter, system-ui, sans-serif" font-size="13.5" text-anchor="start">start / stop</text>

</svg>
