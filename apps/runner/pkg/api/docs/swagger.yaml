definitions:
  BuildSnapshotRequestDTO:
    properties:
      context:
        items:
          type: string
        type: array
      dockerfile:
        type: string
      organizationId:
        type: string
      pushToInternalRegistry:
        type: boolean
      registry:
        $ref: '#/definitions/RegistryDTO'
      snapshot:
        description: Snapshot ID and tag or the build's hash
        type: string
      sourceRegistries:
        items:
          $ref: '#/definitions/RegistryDTO'
        type: array
    required:
    - dockerfile
    - organizationId
    type: object
  CreateBackupDTO:
    properties:
      registry:
        $ref: '#/definitions/RegistryDTO'
      snapshot:
        type: string
    required:
    - registry
    - snapshot
    type: object
  CreateSandboxDTO:
    properties:
      cpuQuota:
        minimum: 1
        type: integer
      entrypoint:
        items:
          type: string
        type: array
      env:
        additionalProperties:
          type: string
        type: object
      fromVolumeId:
        type: string
      gpuQuota:
        minimum: 0
        type: integer
      id:
        type: string
      memoryQuota:
        minimum: 1
        type: integer
      metadata:
        additionalProperties:
          type: string
        type: object
      networkAllowList:
        type: string
      networkBlockAll:
        type: boolean
      osUser:
        type: string
      registry:
        $ref: '#/definitions/RegistryDTO'
      snapshot:
        type: string
      storageQuota:
        minimum: 1
        type: integer
      userId:
        type: string
      volumes:
        items:
          $ref: '#/definitions/dto.VolumeDTO'
        type: array
    required:
    - id
    - osUser
    - snapshot
    - userId
    type: object
  ErrorResponse:
    description: Error response
    properties:
      code:
        example: BAD_REQUEST
        type: string
      message:
        example: Bad request
        type: string
      method:
        example: GET
        type: string
      path:
        example: /api/resource
        type: string
      statusCode:
        example: 400
        type: integer
      timestamp:
        example: "2023-01-01T12:00:00Z"
        type: string
    required:
    - code
    - message
    - method
    - path
    - statusCode
    - timestamp
    type: object
  IsRecoverableDTO:
    properties:
      errorReason:
        type: string
    required:
    - errorReason
    type: object
  IsRecoverableResponse:
    properties:
      recoverable:
        type: boolean
    type: object
  PullSnapshotRequestDTO:
    properties:
      destinationRef:
        type: string
      destinationRegistry:
        $ref: '#/definitions/RegistryDTO'
      registry:
        $ref: '#/definitions/RegistryDTO'
      snapshot:
        type: string
    required:
    - snapshot
    type: object
  RecoverSandboxDTO:
    properties:
      backupErrorReason:
        type: string
      cpuQuota:
        minimum: 1
        type: integer
      env:
        additionalProperties:
          type: string
        type: object
      errorReason:
        type: string
      fromVolumeId:
        type: string
      gpuQuota:
        minimum: 0
        type: integer
      memoryQuota:
        minimum: 1
        type: integer
      networkAllowList:
        type: string
      networkBlockAll:
        type: boolean
      osUser:
        type: string
      snapshot:
        type: string
      storageQuota:
        minimum: 1
        type: integer
      userId:
        type: string
      volumes:
        items:
          $ref: '#/definitions/dto.VolumeDTO'
        type: array
    required:
    - errorReason
    - osUser
    - snapshot
    - userId
    type: object
  RegistryDTO:
    properties:
      password:
        type: string
      project:
        type: string
      url:
        type: string
      username:
        type: string
    required:
    - password
    - url
    - username
    type: object
  ResizeSandboxDTO:
    properties:
      cpu:
        minimum: 1
        type: integer
      gpu:
        minimum: 0
        type: integer
      memory:
        minimum: 1
        type: integer
    type: object
  RunnerInfoResponseDTO:
    properties:
      metrics:
        $ref: '#/definitions/RunnerMetrics'
      version:
        type: string
    type: object
  RunnerMetrics:
    properties:
      currentAllocatedCpu:
        type: integer
      currentAllocatedDiskGiB:
        type: integer
      currentAllocatedMemoryGiB:
        type: integer
      currentCpuUsagePercentage:
        type: number
      currentDiskUsagePercentage:
        type: number
      currentMemoryUsagePercentage:
        type: number
      currentSnapshotCount:
        type: integer
    type: object
  SandboxInfoResponse:
    properties:
      backupError:
        type: string
      backupState:
        $ref: '#/definitions/enums.BackupState'
      state:
        $ref: '#/definitions/enums.SandboxState'
    type: object
  SnapshotExistsResponse:
    properties:
      exists:
        example: true
        type: boolean
    type: object
  SnapshotInfoResponse:
    properties:
      cmd:
        example:
        - '["nginx"'
        - '"-g"'
        - '"daemon off;"]'
        items:
          type: string
        type: array
      entrypoint:
        example:
        - '["nginx"'
        - '"-g"'
        - '"daemon off;"]'
        items:
          type: string
        type: array
      hash:
        example: a7be6198544f09a75b26e6376459b47c5b9972e7351d440e092c4faa9ea064ff
        type: string
      name:
        example: nginx:latest
        type: string
      sizeGB:
        example: 0.13
        type: number
    type: object
  TagImageRequestDTO:
    properties:
      sourceImage:
        type: string
      targetImage:
        type: string
    required:
    - sourceImage
    - targetImage
    type: object
  UpdateNetworkSettingsDTO:
    properties:
      networkAllowList:
        type: string
      networkBlockAll:
        type: boolean
      networkLimitEgress:
        type: boolean
    type: object
  dto.VolumeDTO:
    properties:
      mountPath:
        type: string
      subpath:
        type: string
      volumeId:
        type: string
    type: object
  enums.BackupState:
    enum:
    - NONE
    - PENDING
    - IN_PROGRESS
    - COMPLETED
    - FAILED
    type: string
    x-enum-varnames:
    - BackupStateNone
    - BackupStatePending
    - BackupStateInProgress
    - BackupStateCompleted
    - BackupStateFailed
  enums.SandboxState:
    enum:
    - creating
    - restoring
    - destroyed
    - destroying
    - started
    - stopped
    - starting
    - stopping
    - resizing
    - error
    - unknown
    - pulling_snapshot
    type: string
    x-enum-varnames:
    - SandboxStateCreating
    - SandboxStateRestoring
    - SandboxStateDestroyed
    - SandboxStateDestroying
    - SandboxStateStarted
    - SandboxStateStopped
    - SandboxStateStarting
    - SandboxStateStopping
    - SandboxStateResizing
    - SandboxStateError
    - SandboxStateUnknown
    - SandboxStatePullingSnapshot
info:
  contact: {}
  description: Daytona Runner API
  title: Daytona Runner API
  version: v0.0.0-dev
paths:
  /:
    get:
      description: Health check
      operationId: HealthCheck
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
  /info:
    get:
      description: Runner info with system metrics
      operationId: RunnerInfo
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/RunnerInfoResponseDTO'
      summary: Runner info
  /sandboxes:
    post:
      description: Create a sandbox
      operationId: Create
      parameters:
      - description: Create sandbox
        in: body
        name: sandbox
        required: true
        schema:
          $ref: '#/definitions/CreateSandboxDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Create a sandbox
      tags:
      - sandbox
  /sandboxes/{sandboxId}:
    delete:
      description: Remove a sandbox that has been previously destroyed
      operationId: RemoveDestroyed
      parameters:
      - description: Sandbox ID
        in: path
        name: sandboxId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Sandbox removed
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Remove a destroyed sandbox
      tags:
      - sandbox
    get:
      description: Get sandbox info
      operationId: Info
      parameters:
      - description: Sandbox ID
        in: path
        name: sandboxId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Sandbox info
          schema:
            $ref: '#/definitions/SandboxInfoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get sandbox info
      tags:
      - sandbox
  /sandboxes/{sandboxId}/backup:
    post:
      description: Create sandbox backup
      operationId: CreateBackup
      parameters:
      - description: Sandbox ID
        in: path
        name: sandboxId
        required: true
        type: string
      - description: Create backup
        in: body
        name: sandbox
        required: true
        schema:
          $ref: '#/definitions/CreateBackupDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Backup started
          schema:
