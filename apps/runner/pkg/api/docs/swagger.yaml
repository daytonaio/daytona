      summary: Update sandbox network settings
      tags:
      - sandbox
  /sandboxes/{sandboxId}/recover:
    post:
      consumes:
      - application/json
      description: Recover sandbox from error state using specified recovery type
      operationId: Recover
      parameters:
      - description: Sandbox ID
        in: path
        name: sandboxId
        required: true
        type: string
      - description: Recovery parameters
        in: body
        name: recovery
        required: true
        schema:
          $ref: '#/definitions/RecoverSandboxDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Sandbox recovered
          schema:
            type: string
        "400":
