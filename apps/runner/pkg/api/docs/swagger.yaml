  /snapshots/pull:
    post:
      description: Pull a snapshot from a registry and optionally push to another
        registry
      operationId: PullSnapshot
      parameters:
      - description: Pull snapshot
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/PullSnapshotRequestDTO'
      responses:
        "200":
          description: Snapshot successfully pulled
