<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper | Arbitrage Sub-Agent</title>
    <style>
        :root {
            --bg-color: #050a0f;
            --text-color: #00ffcc;
            --border-color: #00ffcc;
            --accent-glow: 0 0 10px rgba(0, 255, 204, 0.5);
            --danger-color: #ff3366;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .dashboard {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            border: 2px solid var(--border-color);
            box-shadow: var(--accent-glow);
            background: rgba(5, 10, 15, 0.95);
            position: relative;
        }
        
        .dashboard::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            z-index: -1;
            background: linear-gradient(45deg, #00ffcc, #ff3366, #00ffcc);
            opacity: 0.1;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.8rem;
            margin-top: 0;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 15px;
            text-shadow: 0 0 8px var(--text-color);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #aaa;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: rgba(0, 255, 204, 0.08);
            border: 1px solid #444;
            color: #fff;
            padding: 0.8rem;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--border-color);
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.4);
            background: rgba(0, 255, 204, 0.15);
        }

        button {
            width: 100%;
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.2s;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        button:hover:not(:disabled) {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--text-color);
        }
        
        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }

        .console {
            background: #020205;
            border: 1px solid #333;
            padding: 1rem;
            height: 350px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: #ddd;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
            border-left: 3px solid var(--border-color);
        }

        .console pre {
            margin: 0 0 8px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .log-info { color: #888; }
        .log-scan { color: #00ffcc; text-shadow: 0 0 3px #00ffcc; }
        .log-profit { color: #00ff00; font-weight: bold; }
        .log-execute { color: #ff00ff; font-weight: bold; }
        .log-reject { color: var(--danger-color); }

    </style>
</head>
<body>

<div class="dashboard">
    <h1>> Sniper_Runtime // Arbitrage</h1>
    
    <div class="grid">
        <div class="controls">
            <div class="input-group">
                <label>Target Token</label>
                <input type="text" id="token" value="WETH" placeholder="WETH, BTC, SOL...">
            </div>
            <div class="input-group">
                <label>Quote Currency</label>
                <input type="text" id="quote" value="USDT" placeholder="USDT, USDC...">
            </div>
            <div class="input-group">
                <label>Trade Volume (USD)</label>
                <input type="number" id="volume" value="10000" step="1000">
            </div>
            <div class="input-group">
                <label>Min Profit Threshold (%)</label>
                <input type="number" id="threshold" value="0.5" step="0.1">
            </div>
            <button id="runBtn" onclick="runSniper()">Deploy Sniper</button>
        </div>

        <div>
            <label>Sub-Agent Terminal Output</label>
            <div class="console" id="consoleOutput">
                <pre class="log-info">System initialized.</pre>
                <pre class="log-info">Awaiting deploy command...</pre>
            </div>
        </div>
    </div>
</div>

<script>
    function log(msg, type='info') {
        const consoleEl = document.getElementById('consoleOutput');
        const span = document.createElement('pre');
        span.className = `log-${type}`;
        
        // Add timestamp
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}.${now.getMilliseconds().toString().padStart(3,'0')}`;
        
        span.textContent = `[${timeStr}] > ${msg}`;
        consoleEl.appendChild(span);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function runSniper() {
        const token = document.getElementById('token').value;
        const quote = document.getElementById('quote').value;
        const vol = parseFloat(document.getElementById('volume').value);
        const threshold = parseFloat(document.getElementById('threshold').value);

        const btn = document.getElementById('runBtn');
        btn.disabled = true;
        btn.textContent = "Scanning...";
        
        document.getElementById('consoleOutput').innerHTML = '';
        log(`Initiating target lock on ${token}/${quote} across exchanges...`, 'scan');

        try {
            const res = await fetch('/api/v1/snipe', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-API-Key': 'dev-sniper-key-unsafe'
                },
                body: JSON.stringify({ 
                    target_token: token,
                    quote_currency: quote,
                    trade_volume_usd: vol, 
                    min_profit_threshold: threshold 
                })
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail?.message || 'API Error');
            }

            const resp = await res.json();
            const data = resp.data; // AgentResponse wrapper
            
            // Replay messages with typing effect
            for (let i = 0; i < data.messages.length; i++) {
                await new Promise(r => setTimeout(r, 380));
                const msg = data.messages[i];
                let type = 'info';
                if (msg.includes("Scanning") || msg.includes("Found")) type = 'scan';
                else if (msg.includes("PROFITABLE")) type = 'profit';
                else if (msg.includes("No profitable") || msg.includes("standing down")) type = 'reject';
                else if (msg.includes("DEPLOYING") || msg.includes("Step") || msg.includes("NET SECURED")) type = 'execute';
                log(msg, type);
            }

        } catch (e) {
            log(`Error: ${e.message}`, 'reject');
        } finally {
            btn.disabled = false;
            btn.textContent = "Deploy Sniper";
        }
    }
</script>

</body>
</html>
