# Dex config template. Rendered by docker/dex/render-config.sh.
issuer: __DAYTONA_OIDC_ISSUER__
storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556
  allowedOrigins: ['*']
  allowedHeaders: ['x-requested-with']
staticClients:
  - id: daytona
    redirectURIs:
      - '__DAYTONA_DASHBOARD_BASE_URL__'
      - '__DAYTONA_DASHBOARD_BASE_URL__/api/oauth2-redirect.html'
      - 'http://localhost:3009/callback'
      - '__DAYTONA_PROXY_BASE_URL__/callback'
    name: 'Daytona'
    public: true
enablePasswordDB: true
staticPasswords:
  - email: 'dev@daytona.io'
    # password generated with:
    # echo password | htpasswd -BinC 10 admin | cut -d: -f2
    hash: '$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W'
    username: 'admin'
    userID: '1234'
