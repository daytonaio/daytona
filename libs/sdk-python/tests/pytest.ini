[pytest]
asyncio_mode = auto
# Module-scoped event loop so module-scoped async fixtures (e.g.
# ``async_daytona_client`` in test_async_e2e.py) can outlive a single test
# function.  Both the fixture loop and the test loop must use the same scope,
# otherwise tests run on a fresh loop while the fixture's aiohttp session is
# still bound to the original module-scoped loop, surfacing as
# ``RuntimeError: Session is closed``.
asyncio_default_fixture_loop_scope = module
asyncio_default_test_loop_scope = module
