[pytest]
asyncio_mode = auto
# Per-test default: function-scoped loop (pytest-asyncio's own default).
# Each async test gets a fresh event loop, isolating state between tests.
#
# Modules that need a longer-lived loop opt in explicitly via
# ``pytestmark = [pytest.mark.asyncio(loop_scope="module")]`` and
# ``@pytest_asyncio.fixture(loop_scope="module", scope="module")``.
# See ``tests/test_async_e2e.py`` for an example.
