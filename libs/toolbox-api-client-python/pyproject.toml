[project]
name = "daytona_toolbox_api_client"
version = "0.0.0-dev"
description = "Daytona Toolbox API"
authors = [
  {name = "OpenAPI Generator Community",email = "team@openapitools.org"},
]
license = { text = "Apache-2.0" }
readme = "README.md"
keywords = ["OpenAPI", "OpenAPI-Generator", "Daytona Toolbox API"]
requires-python = ">=3.9"

dependencies = [
  "urllib3 (>=2.6.3,<3.0.0)",
  "python-dateutil (>=2.9.0.post0)",
  "pydantic (>=2.13.4)",
  "typing-extensions (>=4.15.0)",
]

[project.urls]
Repository = "https://github.com/daytonaio/daytona"

[tool.poetry]
requires-poetry = ">=2.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.4.2"
pytest-cov = ">=7.1.0"
tox = ">=4.30.3"
flake8 = ">=7.3.0"
types-python-dateutil = ">=2.9.0.20260124"
mypy = ">=1.19.1"


[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.pylint.'MESSAGES CONTROL']
extension-pkg-whitelist = "pydantic"

[tool.mypy]
files = [
  "daytona_toolbox_api_client",
  #"test",  # auto-generated tests
  "tests", # hand-written tests
]
# TODO: enable "strict" once all these individual checks are passing
# strict = true

# List from: https://mypy.readthedocs.io/en/stable/existing_code.html#introduce-stricter-options
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true

## Getting these passing should be easy
strict_equality = true
extra_checks = true

## Strongly recommend enabling this one as soon as you can
check_untyped_defs = true

## These shouldn't be too much additional work, but may be tricky to
## get passing if you use a lot of untyped libraries
disallow_subclassing_any = true
disallow_untyped_decorators = true
disallow_any_generics = true

### These next few are various gradations of forcing use of type annotations
#disallow_untyped_calls = true
#disallow_incomplete_defs = true
#disallow_untyped_defs = true
#
### This one isn't too hard to get passing, but return on investment is lower
#no_implicit_reexport = true
#
### This one can be tricky to get passing if you use a lot of untyped libraries
#warn_return_any = true

[[tool.mypy.overrides]]
module = [
  "daytona_toolbox_api_client.configuration",
]
warn_unused_ignores = true
strict_equality = true
extra_checks = true
check_untyped_defs = true
disallow_subclassing_any = true
disallow_untyped_decorators = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_reexport = true
warn_return_any = true
